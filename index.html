<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Create Account</h2>
            <form id="registration">
                <div class="input-box">
                    <label for="name">Full Name</label>
                    <input type="text" placeholder="Full name" required><br><br>
                </div>
                <div class="input-box">
                    <label for="email">Email</label>
                    <input type="email" placeholder="Email Address" required><br><br>
                </div>
                <div class="input-box">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Password" required><br><br>
                </div>
                <div class="input-box">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" placeholder="confirm password" required><br><br>
                </div>
                <button type="submit">Registration</button>
                <p class="login-text">Already have an account? <a href="a">login</a></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
